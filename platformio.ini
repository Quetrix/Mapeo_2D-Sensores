; ============================================================
; PlatformIO Project Configuration
; 2D Spatial Mapping System — ESP32 Firmware
; ============================================================
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino

; Serial monitor baud rate (for debug output)
monitor_speed = 115200

; Board CPU frequency (ESP32 max = 240 MHz)
board_build.f_cpu = 240000000L

; Required libraries
;   ESPAsyncWebServer — async HTTP server (no blocking)
;   AsyncTCP          — dependency of ESPAsyncWebServer
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP         @ ^1.1.1

; Compiler flags
build_flags =
    -DCORE_DEBUG_LEVEL=0      ; 0 = no debug output on release
    -O2                       ; Optimize for speed
